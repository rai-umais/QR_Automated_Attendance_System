<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flexidance{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    {% block body %}
    <nav class="nav">
        <div class="nav-brand">
            <span class="nav-logo">FX</span>
            <span class="nav-name">Flexidance</span>
        </div>
        <div class="nav-right">
            {% if session.user_id %}
                <span class="nav-user">{{ session.user_name }}</span>
                <a href="{{ url_for('auth.logout') }}" class="nav-logout">Sign out</a>
            {% endif %}
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    {% endblock %}
</body>
</html>
