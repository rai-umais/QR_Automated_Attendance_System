{% extends 'base.html' %} 

{% block title %}Home{% endblock %}

{% block content %}
<div class="landing">
    <div class="landing-bg"></div>
    <div class="landing-bg-pattern"></div>
    
    <div class="landing-center">
        <div class="hero-card">
            <div class="hero-badge">
                <div class="hero-badge-dot"></div>
                Smart Attendance
            </div>
            
            <h1 class="hero-title">FLEXiDance For <span>FLEX</span></h1>
            <p class="hero-desc">Select your role to continue to the portal</p>
            
            <div class="btn-group-landing">
                <a href="{{ url_for('auth.teacher_login') }}" class="btn-primary">
                    Login as Teacher
                </a>
                <a href="{{ url_for('auth.student_login') }}" class="btn-secondary">
                    Login as Student
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
