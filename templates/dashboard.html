{% extends 'base.html' %}
{% block title %}Teacher Dashboard{% endblock %}
{% block content %}

<div class="dashboard">

    <!-- header -->
    <div class="dashboard-header">
        <div>
            <p class="dashboard-greeting">Teacher Dashboard</p>
            <h2 class="dashboard-title">Welcome, {{ name }}</h2>
        </div>
        <a href="{{ url_for('auth.logout') }}" class="btn-secondary">Logout</a>
    </div>

    <!-- course selector -->
    <div class="card mb-24">
        <h3 class="card-title">
            <div class="card-title-icon icon-purple">📚</div>
            Start Attendance
        </h3>
        <div class="session-row">
            <select id="course-select" class="select-input">
                <option value="">-- Select a course --</option>
                {% for course in courses %}
                <option value="{{ course.id }}">
                    {{ course.code }} — {{ course.name }}
                </option>
                {% endfor %}
            </select>
            <button class="btn-primary" onclick="startSession()">
                Start Attendance
            </button>
        </div>
    </div>

    <!-- QR + live panel (hidden until session starts) -->
    <div id="attendance-section" style="display:none" class="mt-24">
        <div class="qr-section">

            <!-- QR panel -->
            <div class="qr-card">
                <h3 class="card-title" style="justify-content:center">
                    <div class="card-title-icon icon-amber">📱</div>
                    Live QR Code
                </h3>
                <div class="qr-wrapper mt-16">
                    <img id="qr-image" src="" alt="QR Code" class="qr-image"/>
                    <div class="qr-countdown-ring"></div>
                </div>
                <p id="qr-status" class="qr-status">Generating...</p>
                <div class="qr-countdown">
                    <div class="countdown-bar"><div class="countdown-fill" id="countdown-fill"></div></div>
                    <span>Refreshes 10s</span>
                </div>
            </div>

            <!-- live students panel -->
            <div class="live-panel">
                <div class="live-panel-header">
                    <h3 class="live-panel-title">
                        <div class="card-title-icon icon-green">
                            <div class="live-dot"></div>
                        </div>
                        Live Attendance
                    </h3>
                    <div style="display:flex;align-items:center;gap:12px">
                        <span id="student-count" class="count-badge">0</span>
                        <button class="btn-primary text-small" onclick="finalizeSession()" style="padding:6px 12px">
                            Finalize ✓
                        </button>
                    </div>
                </div>

                <div class="live-panel-body" id="student-cards">
                    <div class="empty-state" id="empty-msg">
                        <div class="empty-state-icon">📡</div>
                        <div class="empty-state-text">Waiting for students to scan...</div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/qr_refresh.js') }}"></script>
<script>
let activeCourseId = null;
let pollInterval   = null;

function startSession() {
    activeCourseId = document.getElementById('course-select').value;
    if (!activeCourseId) {
        alert('Please select a course first.');
        return;
    }

    fetch('/teacher/start-session', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({course_id: activeCourseId})
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) { alert(data.error); return; }
        document.getElementById('attendance-section').style.display = 'block';
        startQRRefresh(activeCourseId);
        startPollingStudents();
    });
}

function startPollingStudents() {
    pollStudents();
    pollInterval = setInterval(pollStudents, 3000);
}

function pollStudents() {
    fetch(`/teacher/live-students?course_id=${activeCourseId}`)
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('student-cards');
        const emptyMsg  = document.getElementById('empty-msg');
        const count     = document.getElementById('student-count');

        count.textContent = data.students.length;

        if (data.students.length === 0) {
            emptyMsg.style.display = 'block';
            return;
        }

        emptyMsg.style.display = 'none';
        container.innerHTML = '';

        data.students.forEach(s => {
            container.innerHTML += `
            <div class="student-card">
                <button class="remove-btn" onclick="removeStudent('${s.id}')" title="Remove (proxy suspect)">✕</button>
                <div class="student-avatar">${s.name.charAt(0).toUpperCase()}</div>
                <div class="student-info">
                    <div class="student-name">${s.name}</div>
                    <div class="student-roll">${s.roll_number}</div>
                </div>
                <div class="student-meta">
                    <span class="student-time">${s.scanned_at}</span>
                    <div class="status-p">P</div>
                </div>
            </div>`;
        });
    });
}

function removeStudent(recordId) {
    if (!confirm('Remove this student? (marks as proxy suspect)')) return;
    fetch('/teacher/remove-student', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({record_id: recordId})
    })
    .then(res => res.json())
    .then(() => pollStudents());
}

function finalizeSession() {
    if (!confirm('Finalize attendance? Absent students will be marked A.')) return;
    fetch('/session/finalize', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({course_id: activeCourseId})
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || data.error);
        if (data.message) {
            clearInterval(pollInterval);
            document.getElementById('attendance-section').style.display = 'none';
            document.getElementById('course-select').value = '';
        }
    });
}
</script>
{% endblock %}
